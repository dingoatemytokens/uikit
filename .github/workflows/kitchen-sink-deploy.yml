# Builds and deploys the kitchen-sink app to GitHub Pages.
#
# Live URL: https://acronis.github.io/uikit/kitchen-sink/
#
# kitchen-sink imports ui-react and icons-react by package name from their
# built dist, so their dependency graph must be built first. This workflow
# does that explicitly (matching what ci.yml does) so the prebuild script
# in package.json is bypassed and we control the base path ourselves.
#
# Concurrency is shared with demo-deploy.yml (group: pages) to prevent
# two simultaneous GitHub Pages deployments from racing each other.
name: Kitchen Sink - Deploy to Pages

on:
  #  push:
  #    branches: [main]
  #    paths:
  #      - 'apps/kitchen-sink/**'
  #      - 'packages/ui-react/**'
  #      - 'packages/icons-react/**'
  #      - 'packages/tokens-pd/**'
  #      - 'packages/design-assets/**'
  #      - 'packages/design-tokens/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build kitchen-sink dependency graph
        run: pnpm --filter "@acronis-platform/kitchen-sink^..." run build

      - name: Build kitchen-sink
        working-directory: apps/kitchen-sink
        run: pnpm exec vite build --base=/uikit/kitchen-sink/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/kitchen-sink/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
