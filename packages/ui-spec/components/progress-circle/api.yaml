spec_version: '1.0'
component: ProgressCircle

contract:
  properties:
    - name: value
      type: number
      required: false
      default: '0'
      description: Current progress, clamped to [0, max].
    - name: max
      type: number
      required: false
      default: '100'
      description: Value representing full completion.
    - name: size
      type: "'tiny' | 'sm' | 'md' | 'lg'"
      required: false
      default: "'sm'"
      description: Ring diameter + stroke width.
    - name: status
      type: "'brand' | 'danger' | 'critical' | 'warning' | 'success'"
      required: false
      description: >-
        Arc color level. `brand` is a single neutral color; the rest are score levels. Omit to derive the level from value/max by thresholds (≈ <40%
        danger, <60% critical, <80% warning, else success — confirm with design).
    - name: showValue
      type: boolean
      required: false
      default: 'false'
      description: Show the rounded percentage in the center.
    - name: showIcon
      type: boolean
      required: false
      default: 'false'
      description: Show a status icon in the center (priority over showValue).
  events: []
  content:
    - name: children
      description: Custom center content (priority over icon / value).
  methods: []

adapters:
  react:
    component: ProgressCircle
    status: implemented
    import: "import { ProgressCircle } from '@acronis-platform/ui-react'"
    example: |
      <ProgressCircle value={75} max={100} size="sm" showValue />
  vue:
    component: AvProgressRadial
    status: planned
    import: "import { AvProgressRadial } from '@acronis-platform/ui-vue'"
    example: |
      <AvProgressRadial :current-value="75" :total-value="100" size="small" />
  web-components:
    element: ui-progress-circle
    status: planned
    import: "import '@acronis-platform/ui-wc/progress-circle'"
    example: |
      <ui-progress-circle value="75" max="100" size="sm"></ui-progress-circle>
