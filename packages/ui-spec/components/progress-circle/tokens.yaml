spec_version: '1.0'
component: ProgressCircle

# References only. Values live in @acronis-platform/tokens-pd. No
# `--ui-progress-circle-*` tier — the arc reuses the shared status colors, the
# track the border token, and the center label the surface foreground.
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-border-on-surface-border,
      affects: track,
      description: Background ring color.,
    }
  - {
      name: --ui-background-brand-secondary,
      affects: arc,
      description: Arc color in the brand (neutral) mode.,
    }
  - {
      name: --ui-text-on-status-danger,
      affects: arc,
      description: Arc color at the danger level.,
    }
  - {
      name: --ui-text-on-status-critical,
      affects: arc,
      description: Arc color at the critical level.,
    }
  - {
      name: --ui-text-on-status-warning,
      affects: arc,
      description: Arc color at the warning level.,
    }
  - {
      name: --ui-text-on-status-success,
      affects: arc,
      description: Arc color at the success level.,
    }
  - {
      name: --ui-text-on-surface-primary,
      affects: center,
      description: Center percentage label (text-foreground).,
    }
