  - name: --ui-tag-global-container-width-min
    affects: root
  - name: --ui-tag-global-md-container-height
    affects: root
  - name: --ui-tag-global-sm-container-height
    affects: root
  - name: --ui-tag-global-md-icon-size
    affects: icon

  # ── info ──
  - name: --ui-tag-info-container-color
    affects: root
  - name: --ui-tag-info-container-border-color
    affects: root
