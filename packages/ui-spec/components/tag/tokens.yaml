    affects: root
  - name: --ui-tag-global-container-gap
    affects: root
  - name: --ui-tag-global-container-padding-x
    affects: root
  - name: --ui-tag-global-container-padding-y
    affects: root
  - name: --ui-tag-global-container-width-max
