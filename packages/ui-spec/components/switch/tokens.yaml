spec_version: '1.0'
component: Switch

# References only — values live in @acronis-platform/tokens-pd. Track fill is
# wired per checked-state (off / on); the design's hover/active stops equal idle,
# so only idle + disabled are referenced. Box/thumb geometry comes from layout
# utilities, not tokens.
source: '@acronis-platform/tokens-pd'

tokens:
  # ── track fill (off / on) ──
  - {
      name: --ui-switch-off-box-color-idle,
      affects: root,
      description: Track fill when off,
    }
  - { name: --ui-switch-off-box-color-disabled, affects: root }
  - {
      name: --ui-switch-on-box-color-idle,
      affects: root,
      description: Track fill when on,
    }
  - { name: --ui-switch-on-box-color-disabled, affects: root }
  - {
      name: --ui-switch-global-box-border-color-disabled,
      affects: root,
      description: Inset track border when disabled,
    }

  # ── thumb (tick) ──
  - {
      name: --ui-switch-global-tick-color-idle,
      affects: thumb,
      description: Thumb fill,
    }
  - { name: --ui-switch-global-tick-color-disabled, affects: thumb }

  # ── label field ──
  - {
      name: --ui-switch-global-container-gap,
      affects: container,
      description: Gap between the toggle and its label,
    }
  - {
      name: --ui-switch-global-label-color,
      affects: label,
      description: Label text color,
    }

  - {
      name: --ui-focus-primary,
      affects: root,
      description: Focus-visible ring color,
    }
