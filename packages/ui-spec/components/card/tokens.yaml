spec_version: '1.0'
component: Card

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
# This is a design-pending v1: no `--ui-card-*` component tier exists yet, so the
# card consumes the shared *semantic* tokens (via the bridged Tailwind names
# bg-background / text-foreground / border-border / text-muted-foreground in
# ui-react's styles/index.css). Replace these with a `--ui-card-*` tier if/when a
# Figma pass introduces one.
source: '@acronis-platform/tokens-pd'

tokens:
  - {
      name: --ui-background-surface-primary,
      affects: root,
      description: Card surface background (bridged as `bg-background`),
    }
  - {
      name: --ui-text-on-surface-primary,
      affects: root,
      description: Default card text color (bridged as `text-foreground`),
    }
  - {
      name: --ui-border-on-surface-border,
      affects: root,
      description: Card border color (bridged as `border-border`),
    }
  - {
      name: --ui-text-on-surface-secondary,
      affects: description,
      description: Description text color (bridged as `text-muted-foreground`),
    }
